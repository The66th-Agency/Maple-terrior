<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/favicon.png">
  <title>Redirecting | Maple Terroir Blog</title>

  <!-- This page existed as the dynamic Shopify blog template at
       /blog/post?handle=X&blog=Y. Each article is now served as a
       static HTML file at /blog/[handle]. This shim redirects legacy
       URLs to the new static location for SEO and bookmark continuity.
       Strategy: meta-refresh for non-JS crawlers, JS for users, and
       a canonical pointing to the new URL when handle is present. -->

  <link rel="canonical" href="https://mapleterroir.com/blog/" id="canonical-tag">
  <meta name="robots" content="noindex, follow">

  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        var h = p.get('handle');
        if (!h) {
          window.location.replace('/blog/');
          return;
        }
        var target = '/blog/' + encodeURIComponent(h);
        var c = document.getElementById('canonical-tag');
        if (c) c.href = 'https://mapleterroir.com' + target;
        var mr = document.createElement('meta');
        mr.httpEquiv = 'refresh';
        mr.content = '0; url=' + target;
        document.head.appendChild(mr);
        window.location.replace(target);
      } catch (e) {
        window.location.replace('/blog/');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="2; url=/blog/">
  </noscript>

  <style>
    body { font-family: system-ui, sans-serif; background: #FDFBF7; color: #4A4239; display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; padding: 2rem; text-align: center; }
    a { color: #C4841D; }
  </style>
</head>
<body>
  <div>
    <p>Redirecting to the article...</p>
    <p><a href="/blog/">Back to the Maple Terroir blog</a></p>
  </div>
</body>
</html>
